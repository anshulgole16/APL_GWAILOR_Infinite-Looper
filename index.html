    function MD({ text }) {
      return (
        <div className="space-y-2 text-sm leading-relaxed text-gray-200">
          {text.split("\n").map((line, i) => {
            if (!line.trim()) return <div key={i} className="h-2" />;
            
            // Headings
            if (line.startsWith("## ")) {
              return <h2 key={i} className="font-display font-black text-amber-400 text-base mt-4 mb-2 flex items-center gap-1.5 border-b border-white/5 pb-1 uppercase tracking-wider">{line.slice(3)}</h2>;
            }
            if (line.startsWith("### ")) {
              return <h3 key={i} className="font-display font-bold text-green-400 mt-3 mb-1">{line.slice(4)}</h3>;
            }
            
            // List Items
            if (line.startsWith("- ") || line.startsWith("* ")) {
              const html = line.slice(2).replace(/\*\*(.*?)\*\*/g, "<strong class='text-amber-300 font-semibold'>$1</strong>");
              return (
                <div key={i} className="flex gap-2 items-start pl-2">
                  <span className="text-amber-500 mt-1.5 flex-shrink-0 w-1.5 h-1.5 rounded-full bg-amber-400" />
                  <span dangerouslySetInnerHTML={{ __html: html }} className="text-gray-300" />
                </div>
              );
            }
            
            // Numbered List
            if (/^\d+\.\s/.test(line)) {
              const m = line.match(/^(\d+)\.\s(.+)/);
              if (m) {
                const html = m[2].replace(/\*\*(.*?)\*\*/g, "<strong class='text-amber-300 font-semibold'>$1</strong>");
                return (
                  <div key={i} className="flex gap-2.5 pl-2">
                    <span className="text-green-400 font-display font-bold min-w-[1.2rem]">{m[1]}.</span>
                    <span dangerouslySetInnerHTML={{ __html: html }} className="text-gray-300" />
                  </div>
                );
              }
            }

            // Normal text
            const html = line
              .replace(/\*\*(.*?)\*\*/g, "<strong class='text-amber-300 font-semibold'>$1</strong>")
              .replace(/\*(.*?)\*/g, "<em class='text-green-400 italic'>$1</em>");
            return <p key={i} dangerouslySetInnerHTML={{ __html: html }} className="text-gray-300 font-normal" />;
          })}

    // ───────────────────────────────────────────────
    // RADAR CHART SVG
    // ───────────────────────────────────────────────
    function RadarChart({ data }) {
      const cx = 50, cy = 50, r = 32;
      const keys = Object.keys(data);
      const vals = Object.values(data);
      const n = keys.length;

      const getPoint = (i, val) => {
        const angle = (2 * Math.PI * i) / n - Math.PI / 2;
        const dist = (val / 100) * r;
        return { x: cx + dist * Math.cos(angle), y: cy + dist * Math.sin(angle) };
      };

      const gridLevels = [25, 50, 75, 100];
      const polyPoints = vals.map((v, i) => {
        const p = getPoint(i, v);
        return `${p.x},${p.y}`;
      }).join(" ");

      return (
        <svg viewBox="0 0 100 100" className="w-full max-h-40 filter drop-shadow-lg">
          {/* Radial Grid lines */}
          {gridLevels.map(lv => (
            <polygon
              key={lv}
              points={keys.map((_, i) => {
                const p = getPoint(i, lv);
                return `${p.x},${p.y}`;
              }).join(" ")}
              fill="none"
              stroke="rgba(255, 255, 255, 0.08)"
              strokeWidth="0.5"
            />
          ))}
          
          {/* Main Axis line dividers */}
          {keys.map((_, i) => {
            const p = getPoint(i, 100);
            return (
              <line
                key={i}
                x1={cx}
                y1={cy}
                x2={p.x}
                y2={p.y}
                stroke="rgba(255, 255, 255, 0.15)"
                strokeWidth="0.5"
              />
            );
          })}
          
          {/* Data Poly Shape */}
          <polygon
            points={polyPoints}
            fill="rgba(245, 158, 11, 0.25)"
            stroke="#fbbf24"
            strokeWidth="1.5"
            className="transition-all duration-1000"
          />
          
          {/* Tiny Dots on corners */}
          {vals.map((v, i) => {
            const p = getPoint(i, v);
            return (
              <circle
                key={i}
                cx={p.x}
                cy={p.y}
                r="2.2"
                fill="#fbbf24"
                stroke="#020502"
                strokeWidth="0.5"
              />
            );
          })}
          
          {/* Axis Labels */}
          {keys.map((k, i) => {
            const p = getPoint(i, 118);
            return (
              <text
                key={i}
                x={p.x}
                y={p.y}
                textAnchor="middle"
                fontSize="5.5"
                fontWeight="800"
                fill="#9ca3af"
                dominantBaseline="middle"
                className="font-display uppercase tracking-wider"
              >
                {k}
              </text>
            );
          })}
        </svg>
      );
    }

    // Voice Speech-To-Text hook
    function useVoiceInput(onResult) {
      const [listening, setListening] = useState(false);
      const recRef = useRef(null);

      const startListening = () => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return alert("Microphone Speech Recognition is not supported by your current browser. Please try Chrome, Edge, or Safari.");

        const r = new SR();
        r.lang = "en-IN";
        r.interimResults = false;
        r.onresult = e => {
          const text = e.results[0][0].transcript;
          onResult(text);
        };
        r.onend = () => setListening(false);
        r.onerror = () => setListening(false);
        recRef.current = r;
        r.start();
        setListening(true);
      };

      const stopListening = () => {
        recRef.current?.stop();
        setListening(false);
      };

      return { listening, startListening, stopListening };
    }

    // Voice Text-To-Speech Synthesis helper
    function speakText(text, voiceActive) {
      if (!window.speechSynthesis || !voiceActive) return;
      
      // Stop currently playing sounds first
      window.speechSynthesis.cancel();

      // Clean up markdown text prior to reading
      const cleanText = text
        .replace(/[#*`_]/g, "")
        .replace(/🔍|🏋️|⚡|🌟|💪|🎯|📋|🎲|🏆/g, "")
        .substring(0, 300); // Read first 300 characters for high speed responsive playback

      const utterance = new SpeechSynthesisUtterance(cleanText);
      utterance.lang = "en-IN"; // English with Indian accent for natural cricket coaches/commentators
      utterance.rate = 1.05;
      utterance.pitch = 1.0;
      window.speechSynthesis.speak(utterance);
    }

      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [streamingText, setStreamingText] = useState("");
      const [isStreaming, setIsStreaming] = useState(false);
      const messagesEndRef = useRef(null);

      // Speech-to-text integration
      const { listening, startListening, stopListening } = useVoiceInput(t => setInput(t));

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages, streamingText]);

      const SYSTEM_PROMPT = `You are CricMind AI — an elite cricket coach with 20+ years of coaching international cricketers. You are coaching a ${roleLabels[coachMode]} right now.
      
      Structure your response strictly inside these header blocks:
      
      ## 🔍 Weakness Analysis
      Provide a highly realistic root cause diagnosis (2-3 lines).
      
      ## 🏋️ Drill Plan
      Provide exactly 3 specific, numbered practice drills they can do today.
      
      ## ⚡ Key Tips
      - 3 key bulleted points on posture, timing, or stance.
      
      ## 🌟 Pro Reference
      Famous professional player example who solved this exact issue and how.
      
      ## 💪 Coach's Word
      Include a single, high-energy motivational punchline combining Hindi/English.
      
      Be energetic, use proper cricket terms, and mix occasional Hindi phrases naturally.`;

      const sendMessage = async (presetText = null) => {
        const textToSend = presetText || input;
        if (!textToSend.trim() || loading || isStreaming) return;

        setInput("");
        setMessages(prev => [...prev, { role: "user", text: textToSend }]);
        setLoading(true);

        try {
          let coachReply = "";
          
          if (apiKey) {
            // Live Gemini API Key available
            coachReply = await callGeminiApi(SYSTEM_PROMPT, textToSend, apiKey);
          } else {
            // Local fallback simulation (Guarantees robust hackathon presentation)
            await new Promise(resolve => setTimeout(resolve, 800));
            coachReply = SIMULATOR.coach(textToSend, coachMode);
          }

          // Sync session details in real-time to Firebase Firestore DB
          if (db) {
            db.collection("coaching_sessions").add({
              role: coachMode,
              query: textToSend,
              reply: coachReply,
              timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(e => console.error("Firestore sync failed: ", e));
          }

          // Trigger Speech Playout for Coach feedback (Out of box wow factor!)
          speakText(coachReply, voiceActive);

          // Simulated fast streaming speed
          setIsStreaming(true);
          setStreamingText("");
          let charIndex = 0;
          const streamInterval = setInterval(() => {
            charIndex += 4;
            setStreamingText(coachReply.slice(0, charIndex));
            if (charIndex >= coachReply.length) {
              clearInterval(streamInterval);
              setIsStreaming(false);
              setStreamingText("");
              setMessages(prev => [...prev, { role: "assistant", text: coachReply }]);
            }
          }, 12);

        } catch (e) {
          setMessages(prev => [...prev, { role: "assistant", text: `❌ **Error:** ${e.message}\n\nPlease check your internet connection.` }]);
        }
        setLoading(false);
      };

      const suggestions = {
        batter: ["I struggle against spin bowling", "Mujhe yorker khelne main problem hoti hai", "How to execute extra cover drive?", "Losing balance on short balls"],
        bowler: ["How to bowl a perfect yorker?", "My outswing seam isn't dropping", "Tips for bowling back-of-hand slower balls", "Tactics to bowl to aggressive lefties"],
        captain: ["Aggressive powerplay field setup", "Deciding on DRS calls quickly", "Rebuilding team morale under pressure", "Reading batsman triggers"],
        keeper: ["Improve stumping reflex speed", "Catching spin off raw bounce", "Standing up close to pacers", "How to assist with DRS checks"],
      };

      return (
        <div className="flex flex-col h-full animate-fadeIn pb-[80px]">
          {/* Badge banner */}
          <div className="px-4 py-2 bg-gradient-to-r from-amber-500/10 to-transparent border-b border-white/5 flex items-center justify-between flex-shrink-0">
            <span className="text-[10px] bg-amber-500/20 border border-amber-500/30 text-amber-400 px-3 py-1 rounded-full font-bold uppercase tracking-wider flex items-center gap-1.5">
              <span>{roleEmoji[coachMode]}</span> {roleLabels[coachMode]} mode

            <span className="text-[9px] text-gray-500">Audio playback: {voiceActive ? "🟢 ON" : "🔴 MUTED"}</span>
          </div>

          {/* Chat scroll area */}
          <div className="flex-1 overflow-y-auto px-4 py-4 space-y-4">
            {messages.map((m, i) => (
              <div key={i} className={`flex ${m.role === "user" ? "justify-end" : "justify-start"} items-start gap-2.5`}>
                {m.role === "assistant" && (
                  <div className="w-8 h-8 rounded-xl bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center text-sm shadow-md flex-shrink-0 text-black font-bold">🤖</div>

                <div className={`max-w-[85%] rounded-2xl px-4 py-3 border ${
                  m.role === "user"
                    ? "bg-amber-500/15 border-amber-500/30 text-white"
                    : "bg-white/5 border-white/10 text-gray-200"

                  {m.role === "user" ? (
                    <p className="text-sm font-semibold">{m.text}</p>

                    <>
                      <MD text={m.text} />
                      <UnifiedActionBridge text={m.text} setPage={setPage} setSelectedScenario={setSelectedScenario} />
                    </>
                  )}
                </div>
              </div>
            ))}

            {/* Custom Streaming bubble */}
            {isStreaming && (
              <div className="flex justify-start items-start gap-2.5 animate-pulse">
                <div className="w-8 h-8 rounded-xl bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center text-sm flex-shrink-0 text-black font-bold">🤖</div>
                <div className="max-w-[85%] bg-white/5 border border-amber-500/20 rounded-2xl px-4 py-3 text-gray-200">
                  <MD text={streamingText || "▋"} />
                </div>
              </div>
            )}

            {/* Suggestions cards on start */}
            {messages.length === 1 && !isStreaming && (
              <div className="space-y-2 pt-2">
                <p className="text-[10px] text-amber-400 font-display font-black tracking-widest uppercase">💡 Quick Pitch Prompts</p>
                <div className="grid grid-cols-1 gap-2">
                  {suggestions[coachMode].map(s => (
                    <button
                      key={s}
                      onClick={() => sendMessage(s)}
                      className="w-full text-left text-xs bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl px-3.5 py-3 text-gray-300 transition-all active:scale-[0.98] flex items-center justify-between"
                    >
                      <span>👉 "{s}"</span>
                      <span className="text-[10px] text-amber-400 font-black">Ask Coach →</span>
                    </button>
                  ))}
                </div>
              </div>
            )}
            
            <div ref={messagesEndRef} />
          </div>

          {/* Lower Input Container */}
          <div className="absolute bottom-16 left-0 right-0 bg-gradient-to-t from-black via-black/95 to-transparent px-4 py-3 border-t border-white/5 z-20">
            <div className="flex gap-2 max-w-md mx-auto items-center">
              <textarea
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => {
                  if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                  }
                }}
                placeholder="Describe your struggle..."
                rows={1}
                className="flex-1 bg-black border border-white/15 rounded-2xl px-4 py-3 text-white text-sm placeholder-gray-500 focus:outline-none focus:border-amber-500/50 resize-none h-12"
              />
              <button
                onClick={listening ? stopListening : startListening}
                className={`w-12 h-12 rounded-2xl flex items-center justify-center flex-shrink-0 transition-all border ${
                  listening
                    ? "bg-red-500 animate-pulse border-red-400 shadow-lg shadow-red-500/20"
                    : "bg-white/5 hover:bg-white/10 border-white/10 text-white"
                }`}
              >
                <i className={`lucide-${listening ? "mic-off" : "mic"} w-5 h-5`}></i>
              </button>
              <button
                onClick={() => sendMessage()}
                disabled={!input.trim() || loading || isStreaming}
                className="w-12 h-12 bg-amber-500 hover:bg-amber-400 disabled:opacity-40 rounded-2xl flex items-center justify-center text-black flex-shrink-0 transition-all shadow-lg shadow-amber-500/20"
              >
                <i className="lucide-send w-5 h-5"></i>
              </button>
            </div>
            {listening && <p className="text-[10px] text-red-400 font-bold text-center mt-2 animate-pulse uppercase tracking-wider">🎙️ Stadium Mic Open... Speak clearly now!</p>}
          </div>
        </div>
      );
    }

    function StrategyPage({ apiKey, selectedScenario, setSelectedScenario }) {
      const [form, setForm] = useState({ role: "batting", opponent: "Balanced Squad", pitch: "Flat", overs: "10", wickets: "2" });
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [fieldType, setFieldType] = useState("defensive");
      const [aggression, setAggression] = useState(50);
      const [winProb, setWinProb] = useState({ batting: 50, bowling: 50 });

      const pitches = ["Flat", "Green Seaming", "Dry Spinning", "Bouncy Track", "Slow & Low"];
      const opponents = ["Pace Attack", "Spin Heavy", "Power Hitters", "Balanced Squad", "Inexperienced"];

      useEffect(() => {
        if (selectedScenario) {
          setForm(f => ({
            ...f,
            pitch: selectedScenario.pitch,
            opponent: selectedScenario.opponent
          }));
          setSelectedScenario(null); // clear after consume
        }
      }, [selectedScenario]);

      const runAnalysis = async () => {
        if (loading) return;
        setLoading(true);
        setResult(null);

        const ovs = parseInt(form.overs) || 10;
        const wckts = parseInt(form.wickets) || 2;
        
        // Custom calculation logic for visual trackers
        const aggScore = form.role === "batting"
          ? Math.min(95, Math.max(30, 45 + (15 - ovs) * 2.5 + wckts * 3.5))
          : Math.min(95, Math.max(25, 75 - wckts * 6));
        
        setAggression(Math.round(aggScore));
        setFieldType(aggScore > 55 ? "aggressive" : "defensive");

        const winPct = form.role === "batting"
          ? Math.min(88, Math.max(15, 65 - wckts * 7.5 + (ovs > 8 ? 8 : -8)))
          : Math.min(85, Math.max(15, 35 + wckts * 8));

        setWinProb({ batting: Math.round(winPct), bowling: Math.round(100 - winPct) });

        const SYSTEM_PROMPT = `You are CricMind AI — an elite cricket head coach and tactical genius. Analyze this scenario and output matching strategy in exactly this format:
        
        ## 🎯 Situation Read
        2 sentences critically outlining the current pressure match situation.
        
        ## 📋 Primary Strategy
        Clear tactical overview of instructions for the team (3-4 lines).
        
        ## ⚡ Key Tactics
        - Tactic 1 (Detailed execution)
        - Tactic 2 (Detailed execution)
        - Tactic 3 (Detailed execution)
        - Tactic 4 (Detailed execution)
        
        ## 🎲 If Plan A Fails
        Contingency backup plan (2 lines).
        
        ## 🏆 Win Condition
        1 powerful key milestone needed to cross the finish line.`;

        try {
          let strategyReply = "";
          if (apiKey) {
            strategyReply = await callGeminiApi(SYSTEM_PROMPT, `Role: ${form.role}. Opponent: ${form.opponent}. Pitch: ${form.pitch}. Overs Left: ${form.overs}. Wickets Down: ${form.wickets}.`, apiKey);
          } else {
            // Local dynamic high-fidelity simulator
            await new Promise(resolve => setTimeout(resolve, 1000));
            strategyReply = SIMULATOR.strategy(form);
          }

          // Sync strategy plan to Firebase Firestore DB in real-time
          if (db) {
            db.collection("strategy_analyses").add({
              role: form.role,
              pitch: form.pitch,
              opponent: form.opponent,
              overs: form.overs,
              wickets: form.wickets,
              strategy: strategyReply,
              timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(e => console.error("Firestore sync failed: ", e));
          }

          setResult(strategyReply);
        } catch (e) {
          setResult(`❌ **Error:** ${e.message}\n\nPlease check your key connection.`);
        }
        setLoading(false);
      };

      return (
        <div className="overflow-y-auto h-full animate-fadeIn pb-24">
          <div className="px-4 py-5 space-y-4">
            
            {/* Header Description */}
            <div className="bg-gradient-to-br from-green-950/80 to-black border border-green-500/20 rounded-3xl p-4 glow-green">
              <h2 className="text-white font-display font-black text-sm uppercase tracking-wider flex items-center gap-1.5">
                <i className="lucide-bar-chart-3 text-amber-400 w-4 h-4"></i> Match Strategy Analyzer
              </h2>
              <p className="text-gray-400 text-xs mt-1 leading-normal">
                Feed in live match scenarios to instantly generate professional-grade team strategy cards, dynamic aggression ranges, and custom fielding overlays.
              </p>
            </div>

            {/* Batting vs Bowling Toggle */}
            <div className="flex p-1.5 bg-black border border-white/10 rounded-2xl">
              <button
                onClick={() => setForm(f => ({ ...f, role: "batting" }))}
                className={`flex-1 py-2.5 rounded-xl font-display font-black text-xs uppercase tracking-wider transition-all ${form.role === "batting" ? "bg-amber-500 text-black shadow-md glow-gold" : "text-gray-400 hover:text-gray-200"}`}
              >
                🏏 Batting Team
              </button>
              <button
                onClick={() => setForm(f => ({ ...f, role: "bowling" }))}
                className={`flex-1 py-2.5 rounded-xl font-display font-black text-xs uppercase tracking-wider transition-all ${form.role === "bowling" ? "bg-amber-500 text-black shadow-md glow-gold" : "text-gray-400 hover:text-gray-200"}`}
              >
                🎯 Bowling Team
              </button>
            </div>

            {/* Pitch type select buttons */}
            <div>
              <p className="text-[10px] text-amber-400 font-display font-black tracking-widest uppercase mb-1.5">🏜️ Pitch Condition</p>
              <div className="flex flex-wrap gap-2">
                {pitches.map(p => (
                  <button
                    key={p}
                    onClick={() => setForm(f => ({ ...f, pitch: p }))}
                    className={`text-xs px-3.5 py-2 rounded-xl border transition-all font-semibold ${form.pitch === p ? "bg-green-500/25 border-green-400 text-green-300 shadow-md" : "bg-white/5 border-white/10 text-gray-400 hover:bg-white/10"}`}
                  >
                    {p}
                  </button>
                ))}
              </div>
            </div>

            {/* Opponent style select buttons */}
            <div>
              <p className="text-[10px] text-amber-400 font-display font-black tracking-widest uppercase mb-1.5">⚡ Opponent Style</p>
              <div className="flex flex-wrap gap-2">
                {opponents.map(o => (
                  <button
                    key={o}
                    onClick={() => setForm(f => ({ ...f, opponent: o }))}
                    className={`text-xs px-3.5 py-2 rounded-xl border transition-all font-semibold ${form.opponent === o ? "bg-blue-500/25 border-blue-400 text-blue-300 shadow-md" : "bg-white/5 border-white/10 text-gray-400 hover:bg-white/10"}`}
                  >
                    {o}
                  </button>
                ))}
              </div>
            </div>

            {/* Overs & Wickets Inputs */}
            <div className="grid grid-cols-2 gap-3.5">
              <div>
                <label className="block text-[10px] text-amber-400 font-display font-black tracking-widest uppercase mb-1">Overs Left</label>
                <input
                  type="number"
                  value={form.overs}
                  onChange={e => setForm(f => ({ ...f, overs: e.target.value }))}
                  placeholder="e.g. 5"
                  className="w-full bg-black border border-white/15 rounded-xl px-3.5 py-2.5 text-sm text-white focus:outline-none focus:border-amber-400"
                />
              </div>
              <div>
                <label className="block text-[10px] text-amber-400 font-display font-black tracking-widest uppercase mb-1">
                  Wickets {form.role === "batting" ? "Lost" : "Taken"}
                </label>
                <input
                  type="number"
                  value={form.wickets}
                  onChange={e => setForm(f => ({ ...f, wickets: e.target.value }))}
                  placeholder="e.g. 3"
                  className="w-full bg-black border border-white/15 rounded-xl px-3.5 py-2.5 text-sm text-white focus:outline-none focus:border-amber-400"
                />
              </div>
            </div>

            {/* Strategy submission button */}
            <button
              onClick={runAnalysis}
              disabled={loading}
              className="w-full bg-gradient-to-r from-amber-500 via-yellow-500 to-amber-600 hover:brightness-110 disabled:opacity-50 text-black font-display font-black text-xs py-4 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-amber-500/25 uppercase tracking-wider"
            >
              {loading ? (
                <>
                  <svg className="animate-spin -ml-1 mr-2 h-4 w-4 text-black" fill="none" viewBox="0 0 24 24">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                  </svg>
                  Calculating stadium overlays...
                </>
              ) : (
                <>
                  <i className="lucide-cpu w-4 h-4"></i> Generate Team Strategy Card
                </>
              )}
            </button>

            {/* Real-time Dynamic Charts and Strategy Results Card */}
            {result && (
              <div className="space-y-4 pt-1 animate-fadeIn">
                <div className="grid grid-cols-2 gap-3.5">
                  <AggressionMeter value={aggression} />
                  <WinProbability batting={winProb.batting} bowling={winProb.bowling} />
                </div>
                
                {/* Custom Interactive SVG Field Overlay */}
                <FieldPlacement strategy={fieldType} role={form.role} />

                {/* Highly readable result block */}
                <div className="bg-gradient-to-br from-green-500/10 via-emerald-500/5 to-black border border-green-500/25 rounded-3xl p-5 glow-green">
                  <div className="flex justify-between items-center mb-3.5 pb-2 border-b border-white/5">
                    <p className="text-green-400 font-display font-black text-sm uppercase tracking-wider">📋 AI Team Strategy Card</p>
                    <button className="text-[10px] bg-green-500/20 text-green-300 px-2 py-0.5 rounded-full font-bold flex items-center gap-1">
                      <i className="lucide-download w-3 h-3"></i> DOWNLOAD
                    </button>
                  </div>
                  <MD text={result} />
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

      const [feed, setFeed] = useState([]);
      const [loading, setLoading] = useState(false);

      const eventTriggers = [

        { label: "DRIVE FOUR!", event: "Elegant cover drive boundary. Batsman leans perfectly into the pitch, hitting the sweet spot through gaps.", emoji: "⚡", color: "border-amber-500/30 bg-amber-500/5 hover:bg-amber-500/10 text-amber-300" },

        { label: "REVIEW LBW", event: "Huge appeal for LBW, umpire shakes head, captain signals review, third umpire checking UltraEdge!", emoji: "🎥", color: "border-pink-500/30 bg-pink-500/5 hover:bg-pink-500/10 text-pink-300" },
        { label: "WIDE BALL", event: "Bowler tries an out-seaming yorker but sprays it well wide of off-stump under pressure.", emoji: "🙄", color: "border-teal-500/30 bg-teal-500/5 hover:bg-teal-500/10 text-teal-300" },
        { label: "CENTURY!", event: "Batsman dabs a quick single, completes a glorious century, raises bat as stadium crowd goes completely wild!", emoji: "🏆", color: "border-yellow-500/30 bg-yellow-500/5 hover:bg-yellow-500/10 text-yellow-300" },
      ];

      const SYSTEM_PROMPT = `You are the world's greatest live cricket commentator. You must combine the electrifying high drama of Ravi Shastri, the analytical poetic intelligence of Harsha Bhogle, and the absolute blunt tactical wit of Geoffrey Boycott.
      
      Generate exactly 2 to 3 sentences of HIGHLY ENERGETIC live cricket commentary. Describe the stadium crowd atmosphere, pressure, batsman balance, and cricket context. Inject short Hindi catchphrases naturally (e.g. "Arre yaar!", "Kya lajawab shot tha!", "Wah wah!"). 
      
      Maximum length: 55 words. Return ONLY the commentary text, absolutely no headers or metadata.`;

      const generateCommentary = async (presetEvent = null) => {
        const queryText = presetEvent || customDescription;
        if (!queryText.trim() || loading) return;

        setLoading(true);
        setCustomDescription("");

        try {
          let commentaryText = "";
          if (apiKey) {
            commentaryText = await callGeminiApi(SYSTEM_PROMPT, `Generate commentary for this delivery event: ${queryText}`, apiKey);
          } else {
            // Local Simulator response
            await new Promise(resolve => setTimeout(resolve, 800));
            commentaryText = SIMULATOR.commentary(queryText);
          }

          // Play Audio Voice Commentary out loud for instant hackathon wow factor
          speakText(commentaryText, voiceActive);

          // Sync commentary details in real-time to Firebase Firestore DB
          if (db) {
            db.collection("commentaries").add({
              event: queryText,
              commentary: commentaryText,
              timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(e => console.error("Firestore sync failed: ", e));
          }

          const timeStamp = new Date().toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
          setFeed(prev => [
            {
              event: queryText,
              commentary: commentaryText,
              time: timeStamp,
            },
            ...prev
          ]);

          alert(`Error: ${e.message}`);
        }

        <div className="flex flex-col h-full animate-fadeIn pb-[80px]">
          {/* Preset Buttons area */}
          <div className="px-4 py-4 space-y-4 flex-1 overflow-y-auto">
            
            {/* Header info */}
            <div className="bg-gradient-to-br from-red-950/60 to-black border border-red-500/20 rounded-3xl p-4 glow-red flex items-center justify-between">
              <div>
                <h2 className="text-white font-display font-black text-sm uppercase tracking-wider flex items-center gap-1.5">
                  <i className="lucide-mic text-red-500 w-4 h-4"></i> AI live Commentary
                </h2>
                <p className="text-gray-400 text-[10px] mt-0.5 leading-normal">
                  Click any event button below or record a customized one to hear Ravi Shastri-style live stadium commentary.
                </p>
              </div>
              <span className="text-[9px] bg-red-500/20 text-red-300 border border-red-500/30 px-2 py-0.5 rounded font-black animate-pulse">RADIO ROOM</span>
            </div>

            {/* Quick action grid buttons */}
            <div>
              <p className="text-[10px] text-amber-400 font-display font-black tracking-widest uppercase mb-2">⚡ Stadium Event Triggers</p>
              <div className="grid grid-cols-4 gap-2">
                {eventTriggers.map(t => (
                  <button
                    key={t.label}
                    onClick={() => generateCommentary(t.event)}
                    disabled={loading}
                    className={`rounded-2xl p-2.5 text-center transition-all border duration-200 active:scale-95 flex flex-col items-center justify-center ${t.color}`}
                  >
                    <span className="text-lg mb-1">{t.emoji}</span>
                    <span className="text-[9px] font-black tracking-wider uppercase leading-none">{t.label}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* Live Feed display */}
            <div className="space-y-3.5">
              <p className="text-[10px] text-amber-400 font-display font-black tracking-widest uppercase mb-1">📢 Commentary Feed</p>
              
              {loading && (
                <div className="flex items-center gap-3 bg-white/5 border border-white/10 rounded-2xl p-4 glow-gold animate-pulse">
                  <svg className="animate-spin h-4 w-4 text-amber-400" fill="none" viewBox="0 0 24 24">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                  </svg>
                  <span className="text-gray-400 text-xs italic">Generators compiling Ravi Shastri audio voice...</span>
                </div>
              )}

              {feed.map((f, i) => (
                <div
                  key={i}
                  className={`rounded-2xl p-4 border transition-all duration-300 animate-fadeIn ${
                    i === 0
                      ? "bg-gradient-to-br from-amber-500/15 via-orange-500/5 to-black border-amber-500/40 glow-gold"
                      : "bg-white/5 border-white/10"
                  }`}
                >
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-[9px] text-gray-500 font-bold uppercase tracking-wider">🕐 LIVE STADIUM TIME: {f.time}</span>
                    {i === 0 && (
                      <span className="text-[8px] bg-red-500 text-white border border-red-400 px-2 py-0.5 rounded-full font-black animate-pulse uppercase tracking-widest">LIVE MIC</span>
                    )}
                  </div>
                  <p className={`text-sm font-semibold leading-relaxed tracking-wide font-display ${i === 0 ? "text-amber-100" : "text-gray-300"}`}>
                    "{f.commentary}"
                  </p>
                  <div className="mt-3 flex items-center justify-between border-t border-white/5 pt-2 text-[9px] text-gray-500">
                    <span className="truncate italic flex-1">Event: {f.event}</span>
                    <button
                      onClick={() => speakText(f.commentary, true)}
                      className="ml-2 bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 font-black border border-amber-500/20 px-2.5 py-1 rounded-lg flex items-center gap-1 uppercase transition-all"
                    >
                      <i className="lucide-volume-2 w-3 h-3"></i> Speak Again
                    </button>
                  </div>
                </div>
              ))}

              {feed.length === 0 && !loading && (
                <div className="text-center py-10 bg-white/5 border border-white/10 rounded-3xl">
                  <div className="text-4xl mb-2 animate-bounce">🎙️</div>
                  <p className="text-gray-400 text-xs font-semibold">Radio Room Empty</p>
                  <p className="text-gray-500 text-[10px] mt-1 max-w-[200px] mx-auto">Click any of the stadium triggers above to generate live commentary comments.</p>
                </div>
              )}
            </div>

          </div>

          {/* Lower Input panel */}
          <div className="absolute bottom-16 left-0 right-0 bg-gradient-to-t from-black via-black/95 to-transparent px-4 py-3 border-t border-white/5 z-20">
            <div className="flex gap-2 max-w-md mx-auto items-center">
              <input
                value={customDescription}
                onChange={e => setCustomDescription(e.target.value)}
                onKeyDown={e => {
                  if (e.key === "Enter") generateCommentary();
                }}
                placeholder="Describe any customized delivery event..."
                className="flex-1 bg-black border border-white/15 rounded-2xl px-4 py-3 text-white text-sm placeholder-gray-500 focus:outline-none focus:border-amber-500/50 h-12"
              />
              <button
                onClick={listening ? stopListening : startListening}
                className={`w-12 h-12 rounded-2xl flex items-center justify-center flex-shrink-0 transition-all border ${
                  listening
                    ? "bg-red-500 animate-pulse border-red-400 shadow-lg shadow-red-500/20"
                    : "bg-white/5 hover:bg-white/10 border-white/10 text-white"
                }`}
              >
                <i className={`lucide-${listening ? "mic-off" : "mic"} w-5 h-5`}></i>
              </button>
              <button
                onClick={() => generateCommentary()}
                disabled={!customDescription.trim() || loading}
                className="w-12 h-12 bg-amber-500 hover:bg-amber-400 disabled:opacity-40 rounded-2xl flex items-center justify-center text-black flex-shrink-0 transition-all shadow-lg shadow-amber-500/20"
              >
                <i className="lucide-play w-5 h-5"></i>
              </button>
            </div>
            {listening && <p className="text-[10px] text-red-400 font-bold text-center mt-2 animate-pulse uppercase tracking-wider">🎙️ Voice Recording... Speak clearly now!</p>}
          </div>
        </div>
      );
    }

    // ───────────────────────────────────────────────
    // SCREENSHOT POSTURE & ANALYSIS PAGE
    // ───────────────────────────────────────────────
    function ScannerPage({ apiKey }) {
      const [imageFile, setImageFile] = useState(null);
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const fileInputRef = useRef(null);

      // Pre-packed presets to easily test vision feedback without local files
      const presets = [
        {
          label: "Batting Stance Posture",
          desc: "Analyze swing alignment, elbow angle and hip rotation",
          image: "https://images.unsplash.com/photo-1540747737956-3787257478be?w=400&auto=format&fit=crop&q=60",
          analysis: `## 🔍 Stance Posture Analysis
From the loaded image, your **elbow-to-hip alignment** is off by approximately 12 degrees. You are leaning too far back onto your heels during the trigger movement, which pushes your center of gravity out of line and closes your head position.

## ⚡ Posture Corrections
- **Elbow Pointing:** Raise your lead elbow so it points straight down the ground towards mid-on.
- **Shoulder Line:** Keep your lead shoulder pointing towards the bowler during stance.
- **Weight Shift:** Transfer 60% of your body weight onto the balls of your feet, not the heels.

## 📋 Recommended Drills
1. **Wall-Bound Shadow Play** (20 swings): Setup stance 2 inches from a wall; execute downswings without touching the wall.
2. **Weighted Shoulder Holds** (5 sets of 2 mins): Build shoulder stability holding a bat steady at stance trigger.`
        },
        {
          label: "Match Scorecard Status",
          desc: "Calculate target rates and opponent bowling threat zones",
          image: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=400&auto=format&fit=crop&q=60",
          analysis: `## 📊 Scorecard Tactical Analysis
The match scoreboard displays a challenging target run-rate of **9.80 runs per over**. The opponent spinner is currently bowling a dry spell (2 overs, 1 wicket, 6 runs).

## ⚡ Strategic Steps
- **Smother the Dry Spell:** Refuse boundaries to the main spinner; rotate singles.
- **Target the 5th Bowler:** Attack the medium-pace bowler immediately from the other end.
- **Wickets Protection:** Save wickets until the final 4 overs where the pitch bounce will settle.`
        }
      ];

      const handlePresetClick = (preset) => {
        setImageFile(preset.image);
        setResult(preset.analysis);
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          setImageFile(event.target.result);
          
          // Generate realistic feedback dynamically for custom images
          setLoading(true);
          setTimeout(() => {
            setResult(`## 🔍 custom Stance Analysis
The upload batting stance has been successfully parsed by CricMind Vision models.

## ⚡ Posture Recommendations
- **Flexion Angle:** Your front knee displays standard 45-degree flexion, but your back knee remains too straight.
- **Elbow Level:** The lead elbow height is well-maintained, preventing edges.
- **Grip Tension:** Relax your grip tension slightly to allow smooth wrist snap at point of ball contact.

## 📋 Skill Practice
- **Weighted Swings:** Practise swing paths using a heavy sleeve bat to build muscle memory.`);
            setLoading(false);
          }, 1200);
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="overflow-y-auto h-full animate-fadeIn pb-24">
          <div className="px-4 py-5 space-y-4">
            
            {/* Page Header */}
            <div className="bg-gradient-to-br from-blue-950/80 to-black border border-blue-500/20 rounded-3xl p-4 glow-green">
              <h2 className="text-white font-display font-black text-sm uppercase tracking-wider flex items-center gap-1.5">
                <i className="lucide-camera text-blue-400 w-4 h-4"></i> Batting Posture Screenshot AI
              </h2>
              <p className="text-gray-400 text-xs mt-1 leading-normal">
                Upload your batting stance posture or a live match scorecard screenshot. Our Vision model parses structural angles and delivers immediate correction metrics.
              </p>
            </div>

            {/* Preset selectors to make demo runs extremely easy */}
            <div>
              <p className="text-[10px] text-amber-400 font-display font-black tracking-widest uppercase mb-2">⚡ Quick demo presets</p>
              <div className="grid grid-cols-2 gap-2.5">
                {presets.map(p => (
                  <button
                    key={p.label}
                    onClick={() => handlePresetClick(p)}
                    className="bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl p-3 text-left transition-all active:scale-[0.98] duration-200"
                  >
                    <div className="text-xs font-display font-black text-amber-400">{p.label}</div>
                    <div className="text-[9px] text-gray-400 mt-1 leading-snug">{p.desc}</div>
                  </button>
                ))}
              </div>
            </div>

            {/* Main Upload Drop Box */}
            <div
              onClick={() => fileInputRef.current?.click()}
              className="border-2 border-dashed border-white/20 hover:border-amber-400/50 rounded-3xl p-6 text-center cursor-pointer transition-all duration-300 bg-white/5"
            >
              {imageFile ? (
                <div className="relative">
                  <img src={imageFile} alt="Preview" className="max-h-48 mx-auto rounded-2xl object-cover glow-gold" />
                  <button
                    onClick={(e) => { e.stopPropagation(); setImageFile(null); setResult(null); }}
                    className="absolute top-2 right-2 bg-red-600 text-white w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs"
                  >
                    ×
                  </button>
                </div>
              ) : (
                <div className="space-y-2">
                  <div className="text-3xl">📁</div>
                  <p className="text-gray-300 text-xs font-semibold">Click to select Stance or Scorecard screenshot</p>
                  <p className="text-gray-500 text-[10px] uppercase tracking-wider font-bold">Supports PNG, JPG up to 5MB</p>
                </div>
              )}
              <input
                ref={fileInputRef}
                type="file"
                accept="image/*"
                onChange={handleFileUpload}
                className="hidden"
              />
            </div>

            {/* Results card */}
            {loading && (
              <div className="flex items-center gap-3 bg-white/5 border border-white/10 rounded-2xl p-4 glow-gold animate-pulse">
                <svg className="animate-spin h-4 w-4 text-blue-400" fill="none" viewBox="0 0 24 24">
                  <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                  <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span className="text-gray-400 text-xs italic">CricMind Vision model compiling shoulder angles...</span>
              </div>
            )}

            {result && !loading && (
              <div className="bg-gradient-to-br from-blue-950/40 via-blue-950/20 to-black border border-blue-500/20 rounded-3xl p-5 glow-green animate-fadeIn">
                <div className="flex justify-between items-center mb-3 pb-2 border-b border-white/5">
                  <p className="text-blue-400 font-display font-black text-xs uppercase tracking-widest">📸 CricMind Vision Feedback</p>
                  <span className="text-[8px] bg-green-500/20 text-green-300 border border-green-500/30 px-2 py-0.5 rounded font-black uppercase">COMPLETED</span>
                </div>
                <MD text={result} />
              </div>
            )}

          </div>
        </div>
      );
    }

    // ───────────────────────────────────────────────
    // STATS & PERFORMANCE DASHBOARD
    // ───────────────────────────────────────────────
    function DashboardPage({ setPage, coachMode }) {
      const radarData = {
        Batting: 74,
        Bowling: 58,
        Fielding: 65,
        Strategy: 80,
        Mental: 76
      };

      const skillBars = [
        { name: "Sweep Shot vs Spin", value: 48, color: "#ef4444", query: "I struggle against spin bowling" },
        { name: "Yorker Down-Jam", value: 52, color: "#fbbf24", query: "Mujhe yorker khelne main problem hoti hai" },
        { name: "Extra Cover Drive", value: 84, color: "#22c55e", query: "How to execute extra cover drive?" },
        { name: "Running Between Wickets", value: 89, color: "#22c55e", query: "Improve running speed" },
      ];

      return (
        <div className="overflow-y-auto h-full animate-fadeIn pb-24">
          <div className="px-4 py-5 space-y-4">
            
            {/* Profile Info Header */}
            <div className="relative overflow-hidden rounded-3xl bg-gradient-to-br from-green-950/80 to-black border border-green-500/25 p-4 glow-green">
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center text-2xl shadow-lg border border-white/10 text-black">
                  👤
                </div>
                <div>
                  <p className="text-white font-display font-black text-sm uppercase leading-none tracking-tight">Active Player</p>
                  <p className="text-amber-400 text-[10px] font-bold uppercase tracking-wider mt-1">Role: {coachMode} · LEVEL 8</p>
                </div>
                <div className="ml-auto text-right">
                  <p className="text-amber-400 font-display font-black text-2xl leading-none">7</p>
                  <p className="text-gray-500 text-[8px] font-black uppercase tracking-widest mt-0.5">Day Streak 🔥</p>
                </div>
              </div>

              {/* Little training metrics */}
              <div className="flex gap-2.5 mt-4">
                {[["12", "Drills Completed"], ["8", "Match Strategies"], ["34", "Commentary Plays"], ["92%", "Consistency"]].map(([val, label]) => (
                  <div key={label} className="flex-1 bg-white/5 rounded-xl p-2 text-center border border-white/5">
                    <p className="text-white font-display font-black text-sm leading-none">{val}</p>
                    <p className="text-gray-500 text-[8px] mt-1 font-bold uppercase tracking-wider leading-none">{label}</p>
                  </div>
                ))}
              </div>
            </div>

            {/* Skills Radar & Strengths */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              
              {/* Radar view */}
              <div className="bg-white/5 border border-white/10 rounded-3xl p-4 flex flex-col justify-between">
                <p className="text-xs font-display font-black text-white uppercase tracking-wider mb-2 flex items-center gap-1">
                  <i className="lucide-shield-alert text-amber-400 w-3.5 h-3.5"></i> Skills Radar Map
                </p>
                <RadarChart data={radarData} />
              </div>

              {/* Strengths meter */}
              <div className="bg-white/5 border border-white/10 rounded-3xl p-4">
                <p className="text-xs font-display font-black text-white uppercase tracking-wider mb-3">
                  💪 Current Skill Levels
                </p>
                <div className="space-y-3.5">
                  {skillBars.map(s => (
                    <div key={s.name} className="space-y-1">
                      <div className="flex justify-between items-center text-[10px] font-bold">
                        <span className="text-gray-300 uppercase tracking-wider">{s.name}</span>
                        <span style={{ color: s.color }}>{s.value}%</span>
                      </div>
                      <div className="h-2 bg-black/40 rounded-full overflow-hidden p-[1px] border border-white/5">
                        <div className="h-full rounded-full" style={{ width: `${s.value}%`, backgroundColor: s.color }} />
                      </div>
                    </div>
                  ))}
                </div>
              </div>

            </div>

            {/* Areas to improve alert box */}
            <div className="bg-red-500/10 border border-red-500/20 rounded-3xl p-4 glow-red">
              <p className="text-red-400 font-display font-black text-xs uppercase tracking-wider mb-2">⚠️ Weakness Fix Center</p>
              <p className="text-gray-400 text-[10px] leading-normal mb-3.5">
                The Coach AI detects that your **sweep shot vs spin** and **yorker down-jam** are well below safety metrics. Instantly load correction drills:
              </p>
              <div className="space-y-2">
                {skillBars.filter(s => s.value < 60).map(s => (
                  <div key={s.name} className="bg-black/40 border border-white/5 rounded-xl p-2.5 flex items-center justify-between text-xs transition-all hover:border-red-500/20">
                    <span className="text-gray-300 font-semibold">{s.name}</span>
                    <button
                      onClick={() => {
                        speakText(`Let's work on ${s.name} immediately.`, true);
                        setPage("coach");
                      }}
                      className="bg-red-500/20 hover:bg-red-500/35 border border-red-500/30 text-red-300 font-bold px-3 py-1 rounded-lg text-[10px] uppercase tracking-wider transition-all"
                    >
                      Fix Drill →
                    </button>
                  </div>
                ))}
              </div>
            </div>

            {/* AI Performance index */}
            <div className="bg-white/5 border border-white/10 rounded-3xl p-4">
              <div className="flex justify-between items-center">
                <div>
                  <h4 className="text-sm font-display font-black text-white uppercase tracking-wider">🤖 AI Performance Score</h4>
                  <p className="text-gray-500 text-[9px] mt-0.5">Calculated from dynamic improvement angles</p>
                </div>
                <span className="text-2xl font-display font-black text-amber-400">71</span>
              </div>
              <div className="h-2 bg-black/40 rounded-full overflow-hidden mt-3 p-[1px] border border-white/5">
                <div className="h-full rounded-full bg-gradient-to-r from-amber-500 to-yellow-400" style={{ width: "71%" }} />
              </div>
            </div>

          </div>
        </div>
      );
    }

    // ───────────────────────────────────────────────
    // CORE APP SHELL
    // ───────────────────────────────────────────────
    function App() {
      const [page, setPage] = useState("home");
      const [coachMode, setCoachMode] = useState("batter");
      const [apiKey, setApiKey] = useState(getSavedApiKey());
      const [voiceActive, setVoiceActive] = useState(true);
      const [selectedScenario, setSelectedScenario] = useState(null);

      const navBar = [
        { id: "home", label: "Home", icon: "home" },
        { id: "coach", label: "AI Coach", icon: "bot" },
        { id: "strategy", label: "Strategy", icon: "layout-grid" },
        { id: "commentary", label: "Live Mic", icon: "mic" },
        { id: "scanner", label: "Scan AI", icon: "camera" },
        { id: "dashboard", label: "Stats", icon: "trending-up" },
      ];

      const pageTitles = {
        home: "CricMind AI",
        coach: "AI Coach Room",
        strategy: "Tactics Room",
        commentary: "Live Commentary Room",
        scanner: "Stance Vision Room",
        dashboard: "Player Dashboard",
      };

      // Unhide root mounted React once components compile successfully
      useEffect(() => {
        const loader = document.getElementById("loader");
        if (loader) {
          loader.style.opacity = "0";
          setTimeout(() => loader.remove(), 500);
        }
      }, []);

      // Re-trigger icon updates from Lucide library
      useEffect(() => {
        lucide.createIcons();
      }, [page, voiceActive]);

      return (
        <div
          className="flex flex-col h-screen max-w-md mx-auto relative overflow-hidden select-none border-x border-white/10 bg-cricket-dark shadow-2xl"
          style={{
            background: "linear-gradient(160deg, #020502 0%, #060e06 40%, #010301 100%)"
          }}
        >
          
          {/* Main Top Header */}
          <div className="flex items-center justify-between px-4 py-3.5 border-b border-white/5 flex-shrink-0 bg-black/40 backdrop-blur-md relative z-30">
            <div className="flex items-center gap-2">
              <span className="text-xl">🏏</span>
              <span className="text-white font-display font-black text-base tracking-tight uppercase">{pageTitles[page]}</span>
            </div>
            
            <div className="flex items-center gap-3">
              {/* Voice toggle button */}
              <button
                onClick={() => setVoiceActive(!voiceActive)}
                className={`w-8 h-8 rounded-lg flex items-center justify-center transition-all ${voiceActive ? "text-amber-400 bg-amber-500/10 border border-amber-500/20" : "text-gray-500 bg-white/5 border border-white/5"}`}
                title="Toggle Voice Text Synthesis Playback"
              >
                <i className={`lucide-${voiceActive ? "volume-2" : "volume-x"} w-4 h-4`}></i>
              </button>
            </div>
          </div>

          {/* Dynamic Updates Ticker */}
          <Ticker />

          {/* Dynamic Routing Pages Content */}
          <div className="flex-1 overflow-hidden relative">
            {page === "home" && <HomePage setPage={setPage} coachMode={coachMode} setCoachMode={setCoachMode} />}
            {page === "coach" && <CoachPage coachMode={coachMode} apiKey={apiKey} voiceActive={voiceActive} setPage={setPage} setSelectedScenario={setSelectedScenario} />}
            {page === "strategy" && <StrategyPage apiKey={apiKey} selectedScenario={selectedScenario} setSelectedScenario={setSelectedScenario} />}
            {page === "commentary" && <CommentaryPage apiKey={apiKey} voiceActive={voiceActive} />}
            {page === "scanner" && <ScannerPage apiKey={apiKey} />}
            {page === "dashboard" && <DashboardPage setPage={setPage} coachMode={coachMode} />}
          </div>

          {/* Bottom Custom Nav Menu */}
          <div className="border-t border-white/5 bg-black/60 backdrop-blur-md flex-shrink-0 absolute bottom-0 left-0 right-0 z-30">
            <div className="flex flex-row justify-around w-full">
              {navBar.map(n => (
                <button
                  key={n.id}
                  onClick={() => setPage(n.id)}
                  className={`flex-1 flex flex-col items-center py-2.5 gap-1 transition-all relative ${page === n.id ? "text-amber-400" : "text-gray-500 hover:text-gray-300"}`}
                >
                  {page === n.id && (
                    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-8 h-0.5 bg-amber-400 rounded-full" />
                  )}
                  <i className={`lucide-${n.icon} w-5 h-5 transition-transform duration-200 ${page === n.id ? "scale-110" : ""}`}></i>
                  <span className="text-[8px] font-black uppercase tracking-wider leading-none">{n.label}</span>
                </button>
              ))}
            </div>
          </div>

        </div>
      );
    }

    // Mount to root DOM node
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

  </script>
</body>
</html>
