<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CricMind AI — Elite AI Cricket Coach & Match Strategy Planner</title>
  
  <!-- Font Integration -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    /* Styling elements and premium scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #020502;
    }
    ::-webkit-scrollbar-thumb {
      background: #15803d;
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #fbbf24;
    }

    body {
      background-color: #020502;
      color: #f3f4f6;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      margin: 0;
    }

    /* Live loader spin overlay */
    #loader {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #020502 0%, #050d05 50%, #010301 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-in-out;
    }

    .cricket-ball-loader {
      width: 70px;
      height: 70px;
      border: 4px solid #ef4444;
      border-radius: 50%;
      position: relative;
      background: #dc2626;
      box-shadow: 0 0 25px rgba(239, 68, 68, 0.6);
      animation: spin-ball 2s linear infinite;
    }

    .cricket-seams {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 6px;
      background: white;
      border-top: 1px dashed rgba(0,0,0,0.5);
      border-bottom: 1px dashed rgba(0,0,0,0.5);
      transform: translateY(-50%) rotate(45deg);
    }

    @keyframes spin-ball {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Animated Cricket Loader -->
  <div id="loader">
    <div class="cricket-ball-loader" style="margin-bottom: 1rem;">
      <div class="cricket-seams"></div>
    </div>
    <h2 style="color: white; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.5rem; letter-spacing: 0.1em; text-transform: uppercase; margin: 0;">CricMind AI</h2>
    <p style="color: #fbbf24; font-size: 0.75rem; letter-spacing: 0.05em; margin-top: 0.5rem; font-weight: 600; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;">CREATING STADIUM EXPERIENCE...</p>
  </div>
  
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
  </style>

  <!-- Root mount point -->
  <div id="root"></div>

  <!-- Entry Script (Vite module loading) -->
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
